name: Validate catalog

# No credentials: lints the git-tracked definition (valid JSON) and checks the live public
# endpoint answers anonymously. Works on fork PRs — the trust gate for contributions.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint JSON definitions
        run: |
          python3 -c "import json; json.load(open('portolan.config.json')); print('portolan.config.json OK')"
          python3 -c "import json; n=len(json.load(open('tools/inventory/geoidem_wfs_featuretypes.json'))); print('WFS inventory:', n)"
          python3 -c "import json; n=len(json.load(open('tools/inventory/geoidem_wcs_coverages.json'))); print('WCS inventory:', n)"
      - name: Check live endpoint (anonymous)
        run: |
          base=$(python3 -c "import json;print(json.load(open('portolan.config.json'))['public_base'])")
          code=$(curl -s -o /dev/null -w '%{http_code}' "$base/v1/config")
          echo "$base/v1/config -> HTTP $code"
          test "$code" = "200"
